<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         display: flex; height: 100vh; overflow: hidden; background: #1a1a2e; color: #e0e0e0; }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px; min-width: 200px; padding: 14px 12px; overflow-y: auto;
    background: #16213e; border-right: 1px solid #0f3460; display: flex;
    flex-direction: column; gap: 14px; font-size: 12px;
  }
  #sidebar h1 { font-size: 14px; font-weight: 700; color: #e0e0e0; letter-spacing: 0.04em; }
  #sidebar h2 { font-size: 11px; font-weight: 600; text-transform: uppercase;
                letter-spacing: 0.08em; color: #888; margin-bottom: 6px; }

  /* search */
  #search { width: 100%; padding: 5px 8px; border-radius: 4px;
            border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0;
            font-size: 12px; outline: none; }
  #search:focus { border-color: #4e79a7; }

  /* filter buttons */
  .filter-group { display: flex; flex-wrap: wrap; gap: 5px; }
  .filter-btn {
    padding: 3px 8px; border-radius: 12px; border: 1.5px solid transparent;
    cursor: pointer; font-size: 11px; font-weight: 500; transition: opacity 0.15s;
  }
  .filter-btn.off { opacity: 0.35; }

  /* stats */
  #stats { color: #888; font-size: 11px; line-height: 1.6; }

  /* legend swatches */
  .swatch { display: inline-block; width: 10px; height: 10px;
            border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .edge-swatch { display: inline-block; width: 18px; height: 3px;
                 border-radius: 2px; margin-right: 5px; vertical-align: middle; }
  .legend-row { display: flex; align-items: center; margin-bottom: 4px; }
  .legend-label { font-size: 11px; color: #bbb; }

  /* layout controls */
  #layout-btns { display: flex; flex-wrap: wrap; gap: 5px; }
  .ctrl-btn {
    padding: 4px 9px; border-radius: 4px; border: 1px solid #0f3460;
    background: #1a1a2e; color: #bbb; cursor: pointer; font-size: 11px;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: #0f3460; color: #fff; }

  /* info panel */
  #info {
    flex: 1; background: #16213e; border-radius: 4px; padding: 8px;
    font-size: 11px; color: #aaa; line-height: 1.5; overflow-y: auto;
    min-height: 80px; border: 1px solid #0f3460;
  }
  #info b { color: #e0e0e0; }

  /* ── Canvas ── */
  #network { flex: 1; height: 100vh; }
</style>
</head>

<div id="sidebar">

      <button class="ctrl-btn" onclick="network.fit()">Fit all</button>

    </div>
  </div>

  <div>
    <h2>Node legend</h2>
    <div id="node-legend"></div>
  </div>

  <div>
    <h2>Edge legend</h2>
    <div id="edge-legend"></div>
  </div>

  <div id="stats"></div>

  <div>
    <h2>Selected</h2>
    <div id="info">Click a node to see details.</div>
  </div>
</div>

from": "papers/agent0-unleashing-self-evolving-agents-zero", "to": "claims/self-evolving-agents-improve-reasoning-competitive", "label": "supports", "title": "<b>supports</b><br>+18% math, +24% general reasoning without human data", "color": {"color": "#59a14f", "highlight": "#59a14f", "opacity": 0.75}, "dashes": false, "arrows": "to", "font": {"size": 8, "color": "#555", "background": "rgba(255,255,255,0.85)", "strokeWidth": 0}, "smooth": {"type": "curvedCW", "roundness": 0.12}, "_etype": "supports"}, {"id": 147, "from": "papers/advancing-regulatory-variant-effect-prediction-alphagenome", "to": "concepts/deep-learning-scientific-discovery", "label": "supports", "title": "<b>supports</b><br>AlphaGenome: unified genomics foundation model outperforms 25/26 specialized tools", "color": {"color": "#59a14f", "highlight": "#59a14f", "opacity": 0.75}, "dashes": false, "arrows": "to", "font": {"size": 8, "color": "#555", "background": "rgba(255,255,255,0.85)", "strokeWidth": 0}, "smooth": {"type": "curvedCW", "roundness": 0.12}, "_etype": "supports"}, {"id": 148, "from": "papers/scaling-deep-learning-materials-discovery", "to": "concepts/deep-learning-scientific-discovery", "label": "supports", "title": "<b>supports</b><br>GNoME: 381k new stable materials via graph network (Nature 2023)", "color": {"color": "#59a14f", "highlight": "#59a14f", "opacity": 0.75}, "dashes": false, "arrows": "to", "font": {"size": 8, "color": "#555", "background": "rgba(255,255,255,0.85)", "strokeWidth": 0}, "smooth": {"type": "curvedCW", "roundness": 0.12}, "_etype": "supports"}, {"id": 149, "from": "papers/scaling-deep-learning-materials-discovery", "to": "claims/graph-network-deep-learning-discovers-hundreds", "label": "supports", "title": "<b>supports</b><br>2.2M structures below stability hull, 381k confirmed experimentally", "color": {"color": "#59a14f", "highlight": "#59a14f", "opacity": 0.75}, "dashes": false, "arrows": "to", "font": {"size": 8, "color": "#555", "background": "rgba(255,255,255,0.85)", "strokeWidth": 0}, "smooth": {"type": "curvedCW", "roundness": 0.12}, "_etype": "supports"}, {"id": 150, "from": "papers/generalized-platform-artificial-intelligence-powered-autonomous", "to": "concepts/deep-learning-scientific-discovery", "label": "extends", "title": "<b>extends</b><br>Autonomous enzyme engineering: ML+LLM+robotics for protein optimization", "color": {"color": "#4e79a7", "highlight": "#4e79a7", "opacity": 0.75}, "dashes": false, "arrows": "to", "font": {"size": 8, "color": "#555", "background": "rgba(255,255,255,0.85)", "strokeWidth": 0}, "smooth": {"type": "curvedCW", "roundness": 0.12}, "_etype": "extends"}, {"id": 151, "from": "papers/discovering-symbolic-cognitive-models-human-animal", "to": "concepts/foundation-model-of-cognition", "label": "extends", "title": "<b>extends</b><br>Symbolic cognitive models complement neural foundation models for cognition", "color": {"color": "#4e79a7", "highlight": "#4e79a7", "opacity": 0.75}, "dashes": false, "arrows": "to", "font": {"size": 8, "color": "#555", "background": "rgba(255,255,255,0.85)", "strokeWidth": 0}, "smooth": {"type": "curvedCW", "roundness": 0.12}, "_etype": "extends"}, {"id": 152, "from": "papers/discovering-symbolic-cognitive-models-human-animal", "to": "claims/ai-models-discover-interpretable-symbolic-cognitive", "label": "supports", "title": "<b>supports</b><br>Program synthesis discovers symbolic models matching expert designs", "color": {"color": "#59a14f", "highlight": "#59a14f", "opacity": 0.75}, "dashes": false, "arrows": "to", "font": {"size": 8, "color": "#555", "background": "rgba(255,255,255,0.85)", "strokeWidth": 0}, "smooth": {"type": "curvedCW", "roundness": 0.12}, "_etype": "supports"}, {"id": 153, "from": "papers/impact-large-language-models-scientific-discovery", "to": "concepts/automated-research-pipeline", "label": "extends", "title": "<b>extends</b><br>GPT-4 evaluation provides baseline for LLM scientific discovery capability", "color": {"color": "#4e79a7", "highlight": "#4e79a7", "opacity": 0.75}, "dashes": false, "arrows": "to", "font": {"size": 8, "color": "#555", "background": "rgba(255,255,255,0.85)", "strokeWidth": 0}, "smooth": {"type": "curvedCW", "roundness": 0.12}, "_etype": "extends"}];

const NODE_COLORS = {"papers": {"background": "#4e79a7", "border": "#2d5a8a", "highlight": {"background": "#6b9fc8", "border": "#2d5a8a"}}, "concepts": {"background": "#f28e2b", "border": "#c06a10", "highlight": {"background": "#f5ac60", "border": "#c06a10"}}, "foundations": {"background": "#76b7b2", "border": "#4a8f8a", "highlight": {"background": "#99cec9", "border": "#4a8f8a"}}, "claims": {"background": "#e15759", "border": "#b52b2d", "highlight": {"background": "#ea8183", "border": "#b52b2d"}}, "topics": {"background": "#59a14f", "border": "#3a7233", "highlight": {"background": "#7dc472", "border": "#3a7233"}}, "people": {"background": "#b07aa1", "border": "#7d4d72", "highlight": {"background": "#c89fba", "border": "#7d4d72"}}, "ideas": {"background": "#ff9da7", "border": "#d96b77", "highlight": {"background": "#ffbec5", "border": "#d96b77"}}, "experiments": {"background": "#9c755f", "border": "#6e4f3e", "highlight": {"background": "#b89384", "border": "#6e4f3e"}}};
const EDGE_COLORS = {"supports": "#59a14f", "contradicts": "#e15759", "extends": "#4e79a7", "addresses_gap": "#f28e2b", "derived_from": "#b07aa1", "inspired_by": "#edc948", "tested_by": "#76b7b2", "invalidates": "#d62728", "supersedes": "#9c755f"};
const NODE_DIRS   = ["papers", "concepts", "foundations", "claims", "topics", "people", "ideas", "experiments"];
const EDGE_TYPES  = ["addresses_gap", "contradicts", "derived_from", "extends", "supports"];

// ── State ────────────────────────────────────────────────────────────────────
const hiddenNodeTypes = new Set();
const hiddenEdgeTypes = new Set();
let showEdgeLabels = true;
let searchQuery = "";

// ── vis.js datasets ──────────────────────────────────────────────────────────
const nodesDS = new vis.DataSet(ALL_NODES);
const edgesDS = new vis.DataSet(ALL_EDGES);

const container = document.getElementById("network");
const data = { nodes: nodesDS, edges: edgesDS };

const options = {
  physics: {
    enabled: true,
    forceAtlas2Based: {
      gravitationalConstant: -60,
      centralGravity: 0.005,
      springLength: 120,
      springConstant: 0.06,
      damping: 0.5,
      avoidOverlap: 0.4,
    },
    solver: "forceAtlas2Based",
    stabilization: { iterations: 300, updateInterval: 25 },
  },
  interaction: {
    hover: true,
    tooltipDelay: 150,
    navigationButtons: true,
    keyboard: { enabled: true, bindToWindow: false },
  },
  nodes: { shape: "dot", borderWidth: 1.5, shadow: { enabled: true, size: 4, x: 2, y: 2 } },
  edges: { width: 1.5, selectionWidth: 2.5 },
};

const network = new vis.Network(container, data, options);

// ── Click → info panel ────────────────────────────────────────────────────────
network.on("click", function(params) {
  const info = document.getElementById("info");
  if (params.nodes.length > 0) {
    const nid = params.nodes[0];
    const node = ALL_NODES.find(n => n.id === nid);
    if (node) info.innerHTML = node.title;
  } else if (params.edges.length > 0) {
    const eid = params.edges[0];
    const edge = ALL_EDGES.find(e => e.id === eid);
    if (edge) info.innerHTML = edge.title;
  } else {
    info.textContent = "Click a node to see details.";
  }
});

// ── Filtering ────────────────────────────────────────────────────────────────
function applyFilters() {
  const q = searchQuery.toLowerCase();

  const filteredNodes = ALL_NODES
    .filter(n => !hiddenNodeTypes.has(n.group))
    .filter(n => !q || n.label.toLowerCase().includes(q) || n.id.toLowerCase().includes(q));

  const visibleIds = new Set(filteredNodes.map(n => n.id));

  const filteredEdges = ALL_EDGES
    .filter(e => !hiddenEdgeTypes.has(e._etype))
    .filter(e => visibleIds.has(e.from) && visibleIds.has(e.to));

  nodesDS.clear(); nodesDS.add(filteredNodes);
  edgesDS.clear(); edgesDS.add(filteredEdges);
  updateStats(filteredNodes.length, filteredEdges.length);
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", function() {
  searchQuery = this.value.trim();
  applyFilters();
});

// ── Node type filter buttons ──────────────────────────────────────────────────
const nodeFilterDiv = document.getElementById("node-filters");
NODE_DIRS.forEach(type => {
  const count = ALL_NODES.filter(n => n.group === type).length;
  if (count === 0) return;
  const col = NODE_COLORS[type];
  const btn = document.createElement("button");
  btn.className = "filter-btn";
  btn.textContent = `${type} (${count})`;
  btn.style.background = col.background;
  btn.style.color = "#fff";
  btn.style.borderColor = col.border;
  btn.dataset.type = type;
  btn.onclick = () => {
    if (hiddenNodeTypes.has(type)) { hiddenNodeTypes.delete(type); btn.classList.remove("off"); }
    else { hiddenNodeTypes.add(type); btn.classList.add("off"); }
    applyFilters();
  };
  nodeFilterDiv.appendChild(btn);
});

// ── Edge type filter buttons ──────────────────────────────────────────────────
const edgeFilterDiv = document.getElementById("edge-filters");
EDGE_TYPES.forEach(etype => {
  const count = ALL_EDGES.filter(e => e._etype === etype).length;
  if (count === 0) return;
  const col = EDGE_COLORS[etype] || "#999";
  const btn = document.createElement("button");
  btn.className = "filter-btn";
  btn.textContent = `${etype.replace("_", " ")} (${count})`;
  btn.style.background = col;
  btn.style.color = "#fff";
  btn.style.borderColor = col;
  btn.dataset.etype = etype;
  btn.onclick = () => {
    if (hiddenEdgeTypes.has(etype)) { hiddenEdgeTypes.delete(etype); btn.classList.remove("off"); }
    else { hiddenEdgeTypes.add(etype); btn.classList.add("off"); }
    applyFilters();
  };
  edgeFilterDiv.appendChild(btn);
});

// ── Node legend ───────────────────────────────────────────────────────────────
const nodeLegend = document.getElementById("node-legend");
NODE_DIRS.forEach(type => {
  const count = ALL_NODES.filter(n => n.group === type).length;
  if (count === 0) return;
  const col = NODE_COLORS[type]?.background || "#aaa";
  nodeLegend.innerHTML += `<div class="legend-row">
    <span class="swatch" style="background:${col}"></span>
    <span class="legend-label">${type} <span style="color:#666">(${count})</span></span>
  </div>`;
});

// ── Edge legend ───────────────────────────────────────────────────────────────
const edgeLegend = document.getElementById("edge-legend");
EDGE_TYPES.forEach(etype => {
  const count = ALL_EDGES.filter(e => e._etype === etype).length;
  if (count === 0) return;
  const col = EDGE_COLORS[etype] || "#999";
  edgeLegend.innerHTML += `<div class="legend-row">
    <span class="edge-swatch" style="background:${col}"></span>
    <span class="legend-label">${etype.replace("_", " ")} <span style="color:#666">(${count})</span></span>
  </div>`;
});

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats(nc, ec) {
  document.getElementById("stats").innerHTML =
    `Showing <b>${nc}</b> nodes &nbsp;·&nbsp; <b>${ec}</b> edges`;
}
updateStats(ALL_NODES.length, ALL_EDGES.length);

// ── Layout switcher ───────────────────────────────────────────────────────────
function setLayout(mode) {
  if (mode === "hierarchical") {
    network.setOptions({
      layout: { hierarchical: { enabled: true, direction: "UD", sortMethod: "directed", nodeSpacing: 120 } },
      physics: { enabled: false },
    });
  } else {
    network.setOptions({
      layout: { hierarchical: { enabled: false } },
      physics: { enabled: true, solver: "forceAtlas2Based" },
    });
  }
}

// ── Edge label toggle ─────────────────────────────────────────────────────────
function toggleEdgeLabels() {
  showEdgeLabels = !showEdgeLabels;
  const updates = ALL_EDGES.map(e => ({ id: e.id, label: showEdgeLabels ? e.label : "" }));
  edgesDS.update(updates);
}
</script>
</body>
