name: Daily arXiv digest

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 08:00 Beijing time
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch arXiv feed
        run: python tools/fetch_arxiv.py -o /tmp/arxiv_feed.json

      - name: Run daily-arxiv
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          claude -p "Run /daily-arxiv using the feed at /tmp/arxiv_feed.json." | tee /tmp/claude_output.txt
          if ! grep -qi 'ingest\|added\|updated\|no new papers\|0 papers' /tmp/claude_output.txt; then
            echo "::warning::claude -p produced no recognized output — check logs"
          fi

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add wiki/
          if git diff --cached --quiet; then
            echo "No wiki changes to commit"
          else
            git commit -m "daily-digest: $(date +%Y-%m-%d)"
            git push
          fi
